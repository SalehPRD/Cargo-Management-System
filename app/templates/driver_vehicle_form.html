<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت ماشین - سامانه اعلام بار</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tahoma, sans-serif; background: #0D1117; color: #E6EDF3; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #161B22; border-left: 1px solid #2A3441; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 20px 16px; border-bottom: 1px solid #2A3441; }
        .logo-icon { font-size: 28px; margin-bottom: 8px; }
        .logo h2 { font-size: 13px; font-weight: 700; }
        .logo p { font-size: 11px; color: #8B98A8; }
        nav { padding: 14px 10px; flex: 1; }
        .nav-label { font-size: 10px; font-weight: 600; color: #4A5568; padding: 0 8px; margin-bottom: 6px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
        .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; font-size: 12px; color: #8B98A8; cursor: pointer; margin-bottom: 2px; text-decoration: none; }
        .nav-item:hover { background: #1C2333; color: #E6EDF3; }
        .nav-item.active { background: rgba(245,166,35,0.1); color: #F5A623; font-weight: 600; }
        .user-box { padding: 14px 16px; border-top: 1px solid #2A3441; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #F5A623, #E8833A); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; }
        .user-name { font-size: 12px; font-weight: 600; }
        .user-role { font-size: 10px; background: rgba(245,166,35,0.15); color: #F5A623; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-top: 2px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar { padding: 14px 24px; border-bottom: 1px solid #2A3441; background: #161B22; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 15px; font-weight: 700; }
        .topbar p { font-size: 11px; color: #8B98A8; margin-top: 2px; }
        .content { padding: 24px; }
        .form-card { background: #161B22; border: 1px solid #2A3441; border-radius: 12px; padding: 24px; max-width: 500px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #8B98A8; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 14px; background: #1C2333; border: 1px solid #2A3441; border-radius: 8px; color: #E6EDF3; font-family: Tahoma, sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #F5A623; }
        select option { background: #1C2333; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-family: Tahoma, sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: linear-gradient(135deg, #F5A623, #E8833A); color: #000; }
        .btn-ghost { background: #1C2333; color: #8B98A8; border: 1px solid #2A3441; }
        .form-actions { display: flex; gap: 10px; margin-top: 8px; }
        .error-box { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #FF6B6B; margin-bottom: 16px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🚛</div>
            <h2>سامانه اعلام بار</h2>
            <p>پنل راننده</p>
        </div>
        <nav>
            <div class="nav-label">منو</div>
            <a href="/driver/{{ driver.id }}" class="nav-item">📊 داشبورد</a>
            <a href="/driver/{{ driver.id }}/queue" class="nav-item">⏳ نوبت‌گیری</a>
            <a href="/driver/{{ driver.id }}/cargo" class="nav-item">📦 انتخاب بار</a>
            <a href="/driver/{{ driver.id }}/vehicles" class="nav-item active">🚛 ماشین‌هایم</a>
            <a href="/driver/{{ driver.id }}/history" class="nav-item">📋 تاریخچه بارها</a>
            <a href="/driver/{{ driver.id }}/profile" class="nav-item">👤 پروفایل</a>
            <a href="/logout" class="nav-item">🚪 خروج</a>
        </nav>
        <div class="user-box">
            <div class="avatar">ر</div>
            <div>
                <div class="user-name">{{ driver.full_name }}</div>
                <div class="user-role">راننده | {{ driver.id }}</div>
            </div>
        </div>
    </aside>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>ثبت ماشین جدید</h1>
                <p>افزودن ماشین به ناوگان شما</p>
            </div>
            <a href="/driver/{{ driver.id }}/vehicles" class="btn btn-ghost">← بازگشت</a>
        </div>
        <div class="content">
            <div class="form-card">
                {% if error %}
                <div class="error-box">⚠️ {{ error }}</div>
                {% endif %}
                <form method="post" action="/driver/{{ driver.id }}/vehicles/add">
                    <div class="form-group">
                        <label>شماره هوشمند</label>
                        <input type="text" name="smart_number" placeholder="شماره هوشمند ماشین" required>
                    </div>
                    <div class="form-group">
                        <label>پلاک</label>
                        <input type="text" name="plate" placeholder="مثلاً: ایران ۱۲۳ الف ۴۵" required>
                    </div>
                    <div class="form-group">
                        <label>مدل ماشین</label>
                        <select name="model" required>
                            <option value="">انتخاب کنید...</option>
                            <option value="ولوو">ولوو</option>
                            <option value="اسکانیا">اسکانیا</option>
                            <option value="مرسدس بنز">مرسدس بنز</option>
                            <option value="مان">مان</option>
                            <option value="داف">داف</option>
                            <option value="سایر">سایر</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>نوع بارگیر</label>
                        <select name="loader_type" required>
                            <option value="">انتخاب کنید...</option>
                            <option value="کفی">کفی</option>
                            <option value="بغل‌دار">بغل‌دار</option>
                            <option value="کمپرس">کمپرس</option>
                            <option value="چادری">چادری</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">ثبت ماشین ✓</button>
                        <a href="/driver/{{ driver.id }}/vehicles" class="btn btn-ghost">انصراف</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
