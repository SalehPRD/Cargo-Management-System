<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راه اندازی اولیه</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, sans-serif;
            background: #0D1117;
            color: #E6EDF3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161B22;
            border: 1px solid #2A3441;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .logo h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .logo p {
            font-size: 12px;
            color: #8B98A8;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8B98A8;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            background: #1C2333;
            border: 1px solid #2A3441;
            border-radius: 8px;
            color: #E6EDF3;
            font-family: Tahoma, sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #F5A623; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #F5A623, #E8833A);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: Tahoma, sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .notice {
            background: rgba(245,166,35,0.1);
            border: 1px solid rgba(245,166,35,0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #F5A623;
            margin-bottom: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🚛</div>
            <h1>سامانه اعلام بار کارخانه جات</h1>
        </div>
        <div class="notice">
            ⚠️ ادمین اصلی تعریف نشده — لطفاً اطلاعات را وارد کنید
        </div>
        <form method="post" action="/setup">
            <div class="form-group">
                <label>نام و نام خانوادگی</label>
                <input type="text" name="full_name" placeholder="مثلاً: علی رضایی" required>
            </div>
            <div class="form-group">
                <label>شماره تماس</label>
                <input type="text" name="phone" placeholder="مثلاً: 09123456789" required>
            </div>
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" placeholder="نام کاربری دلخواه" required>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" placeholder="رمز عبور قوی انتخاب کنید" required>
            </div>
            <button type="submit">ایجاد ادمین اصلی ✓</button>
        </form>
    </div>
</body>
</html>
