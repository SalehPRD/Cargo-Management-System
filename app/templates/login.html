<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, sans-serif;
            background: #0D1117;
            color: #E6EDF3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161B22;
            border: 1px solid #2A3441;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon { font-size: 40px; margin-bottom: 12px; }
        .logo h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .logo p { font-size: 12px; color: #8B98A8; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8B98A8;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            background: #1C2333;
            border: 1px solid #2A3441;
            border-radius: 8px;
            color: #E6EDF3;
            font-family: Tahoma, sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #F5A623; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #F5A623, #E8833A);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: Tahoma, sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .error {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            color: #FF6B6B;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🚛</div>
            <h1>سامانه اعلام بار</h1>
            <p>ورود به پنل مدیریت</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" placeholder="نام کاربری خود را وارد کنید" required>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" placeholder="رمز عبور خود را وارد کنید" required>
            </div>
            <button type="submit">ورود به سیستم ←</button>
        </form>
    </div>
</body>
</html>
